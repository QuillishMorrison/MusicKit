server {
    listen 80;
    server_name _;

    client_max_body_size 64m;

    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /import {
        return 301 /import/;
    }

    location /import/ {
        root /usr/share/nginx/html;
        try_files /import.html =404;
    }

    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /_auth/navidrome {
        internal;
        proxy_pass http://backend:8000/navidrome/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location /player/ {
        auth_request /_auth/navidrome;
        auth_request_set $navidrome_user $upstream_http_x_navidrome_user;
        error_page 401 =302 /;
        error_page 403 =302 /;
        proxy_pass http://navidrome:4533/player/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /player;
        proxy_set_header Remote-User $navidrome_user;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
