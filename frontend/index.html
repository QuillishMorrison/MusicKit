<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MusicKit</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #f5efe5 0%, #eadcc7 100%);
      color: #1f2430;
    }

    .card {
      width: min(420px, calc(100vw - 32px));
      background: rgba(255, 252, 246, 0.92);
      border: 1px solid rgba(31, 36, 48, 0.1);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(70, 43, 16, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0;
      line-height: 1.45;
      color: #5c6472;
    }

    .status {
      margin-top: 16px;
      color: #2b7a4b;
      min-height: 22px;
    }

    a {
      color: #a34a1f;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Вход в плеер</h1>
    <p>Сейчас проверю Telegram-сессию и сразу открою Navidrome.</p>
    <div id="status" class="status">Авторизация...</div>
    <p>Если импорт нужен отдельно, он доступен по адресу <a href="/import/">/import/</a>.</p>
  </div>

  <script>
    async function start() {
      const tg = window.Telegram?.WebApp;
      const status = document.getElementById('status');

      if (!tg?.initData) {
        status.textContent = 'Открой это приложение именно из Telegram-бота.';
        status.style.color = '#b33030';
        return;
      }

      try {
        tg.ready();
        tg.expand();

        const response = await fetch('/api/auth/telegram', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tg.initData })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.detail || 'Не удалось авторизоваться через Telegram');
        }

        status.textContent = 'Готово, открываю плеер...';
        window.location.replace(data.navidrome_url || '/player/');
      } catch (error) {
        status.textContent = error.message || 'Ошибка авторизации';
        status.style.color = '#b33030';
      }
    }

    start();
  </script>
</body>
</html>
